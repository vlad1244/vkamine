    }

    function App() {
      const tgUser = {
        username: 'Vlad_Mikhalchenko',
        firstName: 'Влад',
        lastName: 'Михальченко',
        avatarLetter: 'В'
      };

      const [balance, setBalance] = useState(1200);
      const [activeTab, setActiveTab] = useState('shop');
      const [myPortfolio, setMyPortfolio] = useState([
        {
          id: 'nft_own_0042',
          type: 'banana',
          name: 'Каменный Банан',

          marketPrice: 0

      const [marketItems, setMarketItems] = useState(INITIAL_MARKETPLACE_ITEMS);
      const [activityLog, setActivityLog] = useState([
        { id: 1, type: 'mint', user: 'Vlad_Mikhalchenko', item: 'Каменный Банан #0042', price: 50, time: '3 мин. назад' },
        { id: 2, type: 'sale', seller: 'Anton_X', buyer: 'Misha_99', item: 'Каменный Банан #0512', price: 110, commission: 5.5, time: '7 мин. назад' }
      ]);

      const [selectedShopItem, setSelectedShopItem] = useState(null);
      const [selectedMarketItem, setSelectedMarketItem] = useState(null);
      const [selectedPortfolioItem, setSelectedPortfolioItem] = useState(null);
      const [listingItem, setListingItem] = useState(null);
      const [listPrice, setListPrice] = useState('');
      const [successModal, setSuccessModal] = useState(null);
      const [toasts, setToasts] = useState([]);

      const addToast = (text, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, text, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 4000);
      };

      const PLATFORM_FEE_PCT = 5;
      const CREATOR_ROYALTY_PCT = 2;

      const handleMintFruit = (baseItem) => {
        if (balance < baseItem.price) {
          addToast('Недостаточно средств на балансе!', 'error');
          return;
        }

        setBalance(prev => prev - baseItem.price);
        const serialNum = '#' + String(Math.floor(Math.random() * 9000) + 1000);
        const dateStr = new Date().toLocaleString('ru-RU', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        const newFruit = {
          id: 'nft_own_' + Date.now(),
          type: baseItem.type,
          name: baseItem.name,
          serial: serialNum,
          originalPrice: baseItem.price,
          mintedAt: dateStr,
          rarity: baseItem.rarity,
          stats: { ...baseItem.stats },
          isListed: false,
          marketPrice: 0
        };

        setMyPortfolio(prev => [newFruit, ...prev]);
        setActivityLog(prev => [
          {
            id: Date.now(),
            type: 'mint',
            user: tgUser.username,
            item: `${baseItem.name} ${serialNum}`,
            price: baseItem.price,
            time: 'Только что'
          },
          ...prev
        ]);

        setSelectedShopItem(null);
        setSuccessModal({
          title: 'Права заявлены!',
          subtitle: `Вы успешно зарегистрировали:`,
          item: newFruit,
          message: 'Фрукт добавлен в ваше портфолио. Теперь вы можете выставить его на P2P рынок для перепродажи с комиссией.'
        });

        addToast(`Выкуплен ${baseItem.name} ${serialNum}!`);
      };

      const handleListToMarket = () => {
        const price = parseFloat(listPrice);
        if (isNaN(price) || price <= 0) {
          addToast('Введите корректную цену', 'error');
          return;
        }

        setMyPortfolio(prev => prev.map(item => {
          if (item.id === listingItem.id) {
            return { ...item, isListed: true, marketPrice: price };
          }
          return item;
        }));

        const newMarketLot = {
          id: listingItem.id,
          type: listingItem.type,
          name: listingItem.name,
          serial: listingItem.serial,
          price: price,
          owner: tgUser.username,
          originalPrice: listingItem.originalPrice,
          mintedAt: listingItem.mintedAt,
          rarity: listingItem.rarity,
          stats: listingItem.stats
        };

        setMarketItems(prev => [newMarketLot, ...prev]);
        addToast(`${listingItem.name} выставлен за ${price} ₽!`);
        setListingItem(null);
        setListPrice('');
        setSelectedPortfolioItem(null);
      };

      const handleCancelSale = (itemId) => {
        setMyPortfolio(prev => prev.map(item => {
          if (item.id === itemId) {
            return { ...item, isListed: false, marketPrice: 0 };
          }
          return item;
        }));

        setMarketItems(prev => prev.filter(item => item.id !== itemId));
        addToast('Снято с продажи');
        setSelectedPortfolioItem(null);
      };

            const fee = (soldPrice * PLATFORM_FEE_PCT) / 100;
            const royalty = (soldPrice * CREATOR_ROYALTY_PCT) / 100;
            const payout = soldPrice - fee - royalty;

            setMyPortfolio(prev => prev.filter(item => item.id !== itemToBuy.id));
            setMarketItems(prev => prev.filter(item => item.id !== itemToBuy.id));

            setActivityLog(prev => [

                type: 'sale',
                seller: tgUser.username,
                buyer: 'Gleb_V_Kamne',
                item: `${itemToBuy.name} ${itemToBuy.serial}`,

                      value={listPrice}
                      onChange={(e) => setListPrice(e.target.value)}
                      className="w-full bg-neutral-950 border border-neutral-800 rounded-2xl px-5 py-4 text-lg font-bold text-neutral-100 focus:outline-none pr-12"
                    />
                    <span className="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-neutral-400">₽</span>
                  </div>
                </div>

                <button 
                  onClick={handleListToMarket}
                  className="w-full py-4 bg-gradient-to-r from-cyan-500 to-fuchsia-600 text-neutral-950 rounded-2xl font-black text-sm"
                >
                  Опубликовать лот
                </button>
              </div>
            </div>
          )}

          {/* Окно успешного действия */}
          {successModal && (
            <div className="fixed inset-0 bg-neutral-950/90 backdrop-blur-md z-50 flex flex-col justify-center p-6 max-w-md mx-auto md:absolute md:rounded-[2.5rem]">
              <div className="bg-[#12141C] border border-neutral-900 rounded-[2rem] p-6 space-y-6 text-center max-w-sm mx-auto shadow-2xl">
                <div className="mx-auto w-16 h-16 bg-emerald-950/60 border border-emerald-500/50 rounded-full flex items-center justify-center text-emerald-400">
                  <Icons.Check />
                </div>

                <div className="space-y-2">
                  <h3 className="text-xl font-black text-neutral-100">{successModal.title}</h3>
                  <p className="text-xs text-neutral-400">{successModal.subtitle}</p>
                </div>

                {successModal.item && (
                  <div className="bg-neutral-950 border border-neutral-900 rounded-2xl p-4 flex flex-col items-center gap-2">
                    {FRUIT_SVGS[successModal.item.type]("w-16 h-16")}
                    <div className="text-xs font-mono text-neutral-400 font-bold">{successModal.item.name} {successModal.item.serial}</div>
                  </div>
                )}

                <p className="text-xs text-neutral-400 leading-relaxed">
                  {successModal.message}
                </p>

                <button 
                  onClick={() => setSuccessModal(null)}
                  className="w-full py-4 bg-neutral-100 hover:bg-white text-neutral-950 rounded-2xl font-black text-xs"
                >
                  Отлично
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
